name = "memory-edge-api"
main = "worker.ts"
compatibility_date = "2024-09-23"

[ai]
binding = "AI"

[durable_objects]
bindings = [{ name = "MEMORY_AGENT", class_name = "MemoryAgent" }]

# Classic DO + ctx.storage (KV-style). For SQLite DOs, use new_sqlite_classes + sql API instead.
[[migrations]]
tag = "v1"
new_classes = ["MemoryAgent"]
