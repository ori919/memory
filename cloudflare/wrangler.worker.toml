name = "memory-edge-api"
main = "worker.ts"
compatibility_date = "2024-09-23"

[ai]
binding = "AI"

[durable_objects]
bindings = [{ name = "MEMORY_AGENT", class_name = "MemoryAgent" }]

# Workers Free plan requires SQLite-backed Durable Objects (new_sqlite_classes).
# KV get/put on ctx.storage still works: https://developers.cloudflare.com/durable-objects/best-practices/access-durable-objects-storage/
[[migrations]]
tag = "v1"
new_sqlite_classes = ["MemoryAgent"]
